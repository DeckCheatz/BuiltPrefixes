# Build a single GE-Proton version.
#
# This workflow is a thin wrapper around the reusable build-version.yml workflow.
# It triggers a build for a single version and updates metadata immediately.
#
# Usage:
#   Trigger manually via workflow_dispatch with the desired version.

name: Build Single Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Proton-GE version (e.g., GE-Proton9-20)'
        required: true
        type: string

# Prevent concurrent metadata updates
concurrency:
  group: release-metadata
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ inputs.version }}
    uses: ./.github/workflows/build-version.yml
    with:
      version: ${{ inputs.version }}
      update_metadata: true
    secrets: inherit
