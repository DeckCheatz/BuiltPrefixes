# Reusable workflow for building a Wine prefix for a specific GE-Proton version.
#
# This workflow can be called from:
#   - build-single.yml: For single version builds with immediate metadata update
#   - build-matrix.yml: For matrix builds with aggregated metadata update
#
# Inputs:
#   - version: The GE-Proton version to build (e.g., GE-Proton9-20)
#   - update_metadata: Whether to update release metadata after build
#
# Outputs:
#   - tarball_sha256: SHA256 checksum of the built tarball
#   - release_url: URL of the created GitHub release

name: Build Version (Reusable)

on:
  workflow_call:
    inputs:
      version:
        description: 'GE-Proton version to build'
        required: true
        type: string
      update_metadata:
        description: 'Update release metadata after build'
        required: false
        type: boolean
        default: false
    outputs:
      tarball_sha256:
        description: 'SHA256 checksum of the built tarball'
        value: ${{ jobs.build.outputs.tarball_sha256 }}
      release_url:
        description: 'URL of the created GitHub release'
        value: ${{ jobs.build.outputs.release_url }}

jobs:
  build:
    name: Build ${{ inputs.version }}
    runs-on: ubuntu-latest
    outputs:
      tarball_sha256: ${{ steps.tarball.outputs.tarball_sha256 }}
      release_url: ${{ steps.release.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install BuildStream and dependencies
        run: |
          pip install buildstream buildstream-plugins dulwich==0.24.0 requests tomlkit
          sudo apt update
          sudo apt install -y bubblewrap lzip
          bst --version

      - name: Lift AppArmor restrictions for bubblewrap
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      # BuildStream CAS (Content Addressable Storage) cache
      # Shared across all Proton-GE versions to reuse expensive artifacts like GCC, MinGW
      # The CAS is content-addressable so artifacts are deduplicated by hash
      - name: Restore BuildStream cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/buildstream
          # Key based on toolchain elements only - these are expensive and shared
          key: buildstream-cas-${{ runner.os }}-${{ hashFiles('elements/toolchains/**/*.bst') }}
          restore-keys: |
            buildstream-cas-${{ runner.os }}-

      - name: Update Proton-GE configuration
        run: |
          echo "Updating configuration for ${{ inputs.version }}..."
          ./scripts/update-proton-config.py "${{ inputs.version }}" --calculate-checksum

      - name: Build Wine prefix
        run: |
          bst --network-retries 10 --on-error quit build deploy/prefix.bst

      - name: Save BuildStream cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: ~/.cache/buildstream
          # Key based on toolchain elements only - these are expensive and shared
          key: buildstream-cas-${{ runner.os }}-${{ hashFiles('elements/toolchains/**/*.bst') }}

      - name: Checkout build artifact
        run: |
          mkdir -p out
          bst artifact checkout --directory out deploy/prefix.bst
          echo "Artifact contents:"
          ls -la out/

      - name: Create tarball
        id: tarball
        run: |
          TARBALL_NAME="wine-prefix-${{ inputs.version }}.tar.gz"
          echo "Creating $TARBALL_NAME..."

          tar -czvf "$TARBALL_NAME" -C out .

          # Calculate SHA256
          SHA256=$(sha256sum "$TARBALL_NAME" | cut -d' ' -f1)
          echo "SHA256: $SHA256"

          echo "tarball_name=$TARBALL_NAME" >> $GITHUB_OUTPUT
          echo "tarball_sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-prefix-${{ inputs.version }}
          path: wine-prefix-${{ inputs.version }}.tar.gz
          retention-days: 7

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prefix-${{ inputs.version }}
          name: Wine Prefix for ${{ inputs.version }}
          body: |
            Pre-built Wine prefix using ${{ inputs.version }}.

            ## Contents
            - Proton-GE: ${{ inputs.version }}
            - Includes: dotnet48, vkd3d, dxvk2030, sdl

            ## Checksum
            ```
            SHA256: ${{ steps.tarball.outputs.tarball_sha256 }}
            ```

            ## Usage
            ```bash
            # Download and extract
            curl -LO "${{ github.server_url }}/${{ github.repository }}/releases/download/prefix-${{ inputs.version }}/wine-prefix-${{ inputs.version }}.tar.gz"
            tar -xzf wine-prefix-${{ inputs.version }}.tar.gz -C ~/.wine
            ```
          files: |
            wine-prefix-${{ inputs.version }}.tar.gz
          draft: false
          prerelease: false

      - name: Save release info for metadata update
        run: |
          mkdir -p release-info
          echo "${{ inputs.version }}" > release-info/version.txt
          echo "${{ steps.tarball.outputs.tarball_sha256 }}" > release-info/sha256.txt

      - name: Upload release info
        uses: actions/upload-artifact@v4
        with:
          name: release-info-${{ inputs.version }}
          path: release-info/
          retention-days: 1

      # Conditional metadata update for single-version builds
      - name: Configure Git
        if: inputs.update_metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update release metadata
        if: inputs.update_metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAX_RETRIES=5
          RETRY_COUNT=0

          while [[ $RETRY_COUNT -lt $MAX_RETRIES ]]; do
            git fetch origin main
            git reset --hard origin/main

            mkdir -p docs
            ./scripts/publish-release-metadata.py add "${{ inputs.version }}" \
              --sha256 "${{ steps.tarball.outputs.tarball_sha256 }}"

            if git diff --quiet docs/releases.json 2>/dev/null; then
              echo "No metadata changes"
              exit 0
            fi

            git add docs/releases.json
            git commit -m "chore(metadata): Add release ${{ inputs.version }}

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

            if git push origin main; then
              echo "Metadata updated"
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Push failed, retry $RETRY_COUNT..."
            sleep 5
          done

          echo "Failed after $MAX_RETRIES attempts"
          exit 1
