# Build multiple GE-Proton versions using a matrix strategy.
#
# This workflow generates a version matrix from a range and calls the reusable
# build-version.yml workflow for each version in parallel. Metadata is updated
# in a separate aggregation job after all builds complete.
#
# Usage:
#   Trigger manually via workflow_dispatch with start and end versions.

name: Build Matrix

on:
  workflow_dispatch:
    inputs:
      start_version:
        description: 'Start Proton-GE version (e.g., GE-Proton9-18)'
        required: true
        type: string
      end_version:
        description: 'End Proton-GE version (e.g., GE-Proton9-20)'
        required: true
        type: string
      verify_versions:
        description: 'Verify versions exist on GitHub before building'
        required: false
        type: boolean
        default: true

# Prevent concurrent metadata updates
concurrency:
  group: release-metadata
  cancel-in-progress: false

jobs:
  generate-matrix:
    name: Generate Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_versions: ${{ steps.matrix.outputs.has_versions }}
      versions: ${{ steps.matrix.outputs.versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate version matrix
        id: matrix
        run: |
          VERIFY_FLAG=""
          if [[ "${{ inputs.verify_versions }}" == "true" ]]; then
            VERIFY_FLAG="--verify"
          fi

          MATRIX=$(./scripts/generate-proton-matrix.py \
            "${{ inputs.start_version }}" \
            "${{ inputs.end_version }}" \
            $VERIFY_FLAG)

          echo "Generated matrix: $MATRIX"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          # Extract version list for metadata job
          VERSIONS=$(echo "$MATRIX" | jq -c '[.include[].version]')
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT

          # Check if we have any versions to build
          VERSION_COUNT=$(echo "$MATRIX" | jq '.include | length')
          if [[ "$VERSION_COUNT" -gt 0 ]]; then
            echo "has_versions=true" >> $GITHUB_OUTPUT
          else
            echo "has_versions=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.version }}
    needs: generate-matrix
    if: needs.generate-matrix.outputs.has_versions == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/build-version.yml
    with:
      version: ${{ matrix.version }}
      update_metadata: false
    secrets: inherit

  update-metadata:
    name: Update Release Metadata
    needs: [generate-matrix, build]
    runs-on: ubuntu-latest
    # Run even if some builds failed, to update metadata for successful ones
    if: always() && needs.build.result != 'cancelled'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all release info artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-info-*
          path: all-release-info/
          merge-multiple: false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update metadata with retry for conflicts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAX_RETRIES=5
          RETRY_COUNT=0

          update_metadata() {
            # Ensure we have latest changes
            git fetch origin main
            git reset --hard origin/main

            # Create docs directory if it doesn't exist
            mkdir -p docs

            # Process each successful build
            for info_dir in all-release-info/release-info-*/; do
              if [[ -d "$info_dir" ]]; then
                VERSION=$(cat "$info_dir/version.txt" 2>/dev/null || echo "")
                SHA256=$(cat "$info_dir/sha256.txt" 2>/dev/null || echo "")

                if [[ -n "$VERSION" && -n "$SHA256" ]]; then
                  echo "Adding metadata for $VERSION (SHA256: $SHA256)"
                  ./scripts/publish-release-metadata.py add "$VERSION" --sha256 "$SHA256"
                fi
              fi
            done

            # Check if there are changes to commit
            if git diff --quiet docs/releases.json 2>/dev/null; then
              echo "No metadata changes to commit"
              return 0
            fi

            # Commit and push
            git add docs/releases.json
            git commit -m "chore(metadata): Update release metadata for $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Updated releases:
          $(ls all-release-info/ | sed 's/release-info-/- /' | head -20)

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

            git push origin main
          }

          # Retry loop for handling conflicts
          while [[ $RETRY_COUNT -lt $MAX_RETRIES ]]; do
            if update_metadata; then
              echo "Metadata updated successfully"
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Attempt $RETRY_COUNT failed, retrying in 5 seconds..."
              sleep 5
            fi
          done

          echo "Failed to update metadata after $MAX_RETRIES attempts"
          exit 1

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: docs/releases.json
          retention-days: 30
